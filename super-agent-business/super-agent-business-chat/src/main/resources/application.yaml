server:
  port: 9082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
prefix:
  distinction:
    name: super-agent
spring:
  application:
    name: ${prefix.distinction.name:super-agent}-business-chat
  data:
    redis:
      database: 0
      host: 10.21.32.85
      port: 6379
      timeout: 3000
      password: admin123
  datasource:
    url: jdbc:mysql://10.21.32.85:3306/super_agent_business_chat?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: admin123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: super-agent-business-chat-hikari
      maximum-pool-size: 10
      minimum-idle: 2
  kafka:
    bootstrap-servers: 10.21.32.85:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
  ai:
    openai:
      # OpenAI 兼容协议的服务入口。
      # 当前这里接的是阿里云百炼 DashScope 的兼容地址，
      # chat 和 embedding 都会通过这个基地址发请求。
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      # OpenAI 兼容协议的访问密钥。
      # 正式环境建议改成环境变量注入，不要把真实密钥直接写在配置文件里。
      api-key: sk-0dede719cb61412f921cf812b82bf93d
      chat:
        options:
          # 对话模型名称。
          model: qwen-plus-latest
          # 回答温度，数值越高结果越发散。
          temperature: 0.5
          # 单次回答允许输出的最大 token 数。
          maxTokens: 5000
      embedding:
        # embedding 单独指定 base-url，便于后续把对话模型和向量模型拆到不同网关时直接切换。
        base-url: https://dashscope.aliyuncs.com/compatible-mode/
        # embedding 调用使用的密钥。
        api-key: sk-0dede719cb61412f921cf812b82bf93d
        options:
          # 向量模型名称。
          # 当前文档切块向量化时，会直接使用这里配置的模型，不再额外在 manage 下重复维护一份。
          model: text-embedding-v4
  main:
    allow-bean-definition-overriding: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    servlet:
      load-on-startup: 1
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement  

app:
  admin-auth:
    username: ${SUPER_AGENT_ADMIN_USERNAME:admin}
    password: ${SUPER_AGENT_ADMIN_PASSWORD:admin123456}
    token-secret: ${SUPER_AGENT_ADMIN_TOKEN_SECRET:super-agent-admin-token-secret-change-me}
    token-expire-minutes: ${SUPER_AGENT_ADMIN_TOKEN_EXPIRE_MINUTES:720}
  preview-mode:
    enabled: ${SUPER_AGENT_PREVIEW_MODE_ENABLED:false}
    message: ${SUPER_AGENT_PREVIEW_MODE_MESSAGE:线上环境为只读展示模式，仅开放浏览与检索能力}
  chat:
    # 是否开启“推荐追问问题”能力。
    # 开启后，主回答生成完成后会额外调用一次模型，产出最多 3 个可继续追问的问题。
    recommendation-enabled: true
    # 单次对话运行过程中，模型最多允许被调用多少次。
    # 这是单次 run 级别的保护阈值，用来避免 ReAct 循环失控。
    max-model-calls-per-run: 8
    # 同一个会话线程累计允许的模型调用上限。
    # 这个限制跨多轮对话生效，用来限制某个 conversationId 长期占用过多资源。
    max-model-calls-per-thread: 40
    # 单次对话运行过程中，工具最多允许被调用多少次。
    # 当前主要限制的是 tavily_search 这类外部联网工具，避免频繁搜索。
    max-tool-calls-per-run: 6
    # 同一个会话线程累计允许的工具调用上限。
    # 用来控制某个会话在长期多轮聊天中的外部工具使用量。
    max-tool-calls-per-thread: 30
    # 生成推荐问题时，最多回看最近多少轮历史问答。
    # 数值越大，上下文越完整，但推荐问题生成的提示词也会更长。
    history-preview-turns: 4
    # 主对话助手的系统提示词。
    # ReactAgent 每次对话都会带上这段指令，用来约束回答风格、工具使用策略和安全边界。
    system-prompt: |
      你是 WeCode 的智能对话助手。
      你的目标是帮助用户获得可靠、结构化、可直接使用的答案。
      
      回答原则：
      1. 对于明显具有时效性、事实性、需要外部验证的问题，优先调用搜索工具。尤其是涉及“今天、明天、昨天、现在、当前、最新、本周、本月、今年”等相对时间的问题，必须以当前日期为准理解，并优先搜索核实。
      2. 如果工具结果不足以支撑结论，要明确说明不确定性，不要编造事实。
      3. 回答尽量结构化、清晰、简洁，适合直接返回给前端展示。
      4. 不要在最终答案中暴露工具调用细节或内部推理格式。
      5. 当已有信息足够时，直接给出最终答案，不要重复调用工具。
    ip-once:
      # 是否开启“陌生 IP 仅允许使用一次”限制（仅拦截 /api/chat/stream）。
      enabled: true
      # 限制标记在 Redis 中保留多久（秒）。默认 1 年，按需调大/调小。
      ttl-seconds: 31536000
      # 被拒绝时返回给前端的提示语（前端会弹出/展示）。
      message: 陌生ip仅仅只能使用一次
      # Redis key 前缀。
      key-prefix: super-agent:ip-once
    # 推荐问题生成模型使用的独立提示词。
    # 这部分不参与主回答，只在主回答结束后用于生成 follow-up questions。
    recommendation-prompt: |
      你是 super-agent 推荐问题生成助手。
      请根据最近几轮对话和最新一轮问答，生成 3 个适合继续追问的中文问题。
      
      要求：
      1. 返回 JSON 数组字符串，例如 ["问题1","问题2","问题3"]。
      2. 每个问题都要自然、具体、可继续追问。
      3. 不要和当前问题重复。
      4. 每个问题尽量控制在 20 个字以内。
    rag:
      # 是否启用“当前文档问答”的前置编排。
      # 开启后，系统会在进入最终执行器之前，先做历史加载、问题改写和文档检索规划。
      enabled: true
      # 是否启用问题改写与子问题拆分。
      rewrite-enabled: true
      # 改写阶段最多回看多少轮历史。
      rewrite-history-turns: 4
      rewrite-options:
        # 是否为 rewrite 阶段单独覆盖模型参数。
        # rewrite 只负责问题独立化和是否拆问判断，低温更符合保守稳定风格。
        enabled: true
        # 改写阶段温度，越低越保守。
        temperature: 0.2
        # 改写阶段 topP，越低越不容易发散。
        top-p: 0.3
        # 改写阶段是否开启 thinking。
        # 这里会通过 OpenAI 兼容协议 extraBody 透传给下游模型。
        thinking: false
      # 单轮最多拆分多少个子问题，避免一次提问被过度切碎。
      max-sub-questions: 4
      # 向量通道每个子问题默认召回数量。
      vector-top-k: 8
      # 关键词通道每个子问题默认召回数量。
      keyword-top-k: 8
      # 多通道合并后进入精排前，最多保留多少个候选片段。
      candidate-top-k: 10
      # 最终注入 Prompt 的证据片段数量。
      # 这一层已经是“融合/精排后的定稿证据数”，不是每个通道各自的 topK。
      final-top-k: 5
      # 向量召回最小相似度，低于这个阈值的候选不会继续进入融合。
      # 作用是防止“数据库总能返回 topK，但这些片段其实根本不够相关”。
      min-vector-similarity: 0.45
      # 关键词通道保留与 top score 相对接近的候选，避免弱命中一起混入。
      # 这里用相对阈值而不是绝对值，是因为 BM25/词法分数在不同问题之间量纲不稳定。
      keyword-relative-score-floor: 0.35
      # 是否启用关键词检索通道。
      keyword-channel-enabled: true
      # 是否启用重排序。
      # 当前已经把“融合前闸门”做进来了，开启 rerank 后会在较干净的候选集上继续精排。
      rerank-enabled: true
      # 单个父块证据允许保留的最大字符数。
      # Parent-Child 结构下，最终回答阶段看到的是父块而不是邻块扩窗结果，
      # 因此这里控制的是“父块正文 + 命中子片段摘要”的整体预算。
      parent-evidence-max-chars: 2200
      # 编排阶段历史上下文最大字符数。
      # 改写和检索规划只需要“足够判断当前轮”的历史，不适合吃完整长会话。
      planning-history-max-chars: 1600
      # 回答阶段历史上下文最大字符数。
      # 这一层会优先使用“更干净的最近用户问题 + 结构化历史要点”，避免上一轮 assistant 输出污染当前回答。
      answer-history-max-chars: 1000
      # 回答阶段全部证据的总字符预算。
      # 用来防止“多子问题 × 多证据”把模型上下文窗口吃满。
      total-evidence-max-chars: 5200
      # 单个子问题最多允许占用的证据字符预算。
      # 避免某一个子问题的长证据把其他子问题完全挤掉。
      per-sub-question-evidence-max-chars: 2200
      # 当知识问题没有任何证据时，直接返回的兜底文案。
      no-evidence-reply: 当前没有从当前文档中检索到足够证据，暂时不能给出可靠结论。你可以补充更具体的章节名、标题或关键词后再试。
      # RAG 回答阶段的系统提示词。
      answer-system-prompt: |
        你是 JavaUp 的企业知识问答助手。
        你的回答必须严格基于给定证据，不要编造证据中不存在的事实。
        如果证据不足以支持明确结论，请直接说明资料不足。
        如果问题被拆分成多个子问题，请按编号逐一回答。
        如果使用了证据编号，请在对应句子末尾标注 [1][2] 这类引用编号。
      history-summary:
        # 是否启用“长期摘要 + 最近原文窗口”的生产级会话压缩。
        enabled: true
        # 最近多少轮原文始终直接保留，不进入长期摘要。
        keep-recent-turns: 4
        # 单次增量压缩最多推进多少轮，避免一次把超长历史全塞给模型。
        compression-batch-turns: 6
        # 最近原文窗口最大字符数。
        recent-transcript-max-chars: 2200
        # 长期摘要文本最大字符数。
        summary-max-chars: 1400
      rerank:
        # 是否启用基于 HTTP 的外部 Rerank 接口。
        enabled: false
        # 外部 Rerank 服务地址，默认沿用 SiliconFlow 兼容接口。
        url: https://api.siliconflow.cn/v1/rerank
        # Rerank API Key，默认和聊天模型密钥解耦，未配置时会自动回退到 spring.ai.openai.api-key。
        api-key: ${RERANK_API_KEY:${spring.ai.openai.api-key}}
        # Rerank 模型名称。
        model: BAAI/bge-reranker-v2-m3
        # 单次精排后保留的前 N 个候选。
        top-n: 5

  tavily:
    # 是否启用 Tavily 联网搜索工具。
    # 关闭后，ReactAgent 即使判断需要搜索，也无法调用该工具。
    enabled: true
    # Tavily API 的服务地址。
    # 如果后续切换代理或企业网关，可以改这里。
    base-url: https://api.tavily.com
    # Tavily 搜索接口路径。
    # 默认使用官方的 /search 端点。
    search-path: /search
    # Tavily 的 API Key。
    # 推荐通过环境变量注入，避免把真实密钥写进配置文件。
    api-key: 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
    # 搜索主题类型。
    # Tavily 当前只接受 general、news、finance 三个枚举值。
    # 一般场景优先用 general。
    topic: general
    # 搜索深度。
    # advanced 会更重一些，但通常能拿到更完整的搜索结果。
    search-depth: advanced
    # 单次搜索最多返回多少条候选结果。
    # 结果越多，引用来源越全，但也会增加模型处理成本。
    max-results: 5
    # 是否让 Tavily 在结果中返回它生成的 answer 摘要。
    # 当前我们主要使用 results 里的来源信息，但 answer 也会被工具结果带回模型。
    include-answer: true
    # 是否返回网页原始全文内容。
    # 默认关闭，避免响应过大；如果后续需要做更深的抽取分析，可以再打开。
    include-raw-content: false

  manage:
    minio:
      # MinIO 服务地址。
      # 上传的原始文件和解析后的纯文本都会放在这里。
      # 本地一般是 9000 端口；如果你是 docker 启动的 MinIO，这里填宿主机映射地址。
      endpoint: http://10.21.32.85:9000
      # MinIO 访问账号。
      # 本地开发通常使用默认账号，生产环境建议改成专用 AK。
      access-key: minio
      # MinIO 访问密码。
      # 生产环境不要直接写死在配置文件里，建议通过环境变量或配置中心下发。
      secret-key: admin123
      # 文档管理模块统一使用的 bucket 名称。
      # 应用启动时会自动检查这个 bucket 是否存在，不存在就自动创建。
      bucket-name: ${prefix.distinction.name:super-agent}-document
      # 原始文件对象前缀。
      # 最终对象路径一般会在这个前缀下再拼接文档 id 和文件名。
      object-prefix: rag/document
      # 解析后纯文本对象前缀。
      # Tika 解析完成后，会把纯文本结果单独存一份，方便后续切块和重建索引。
      parsed-text-prefix: rag/parsed-text
    kafka:
      # 文档上传后，异步执行“解析 + 策略推荐”的主题。
      parse-topic: super-agent-document-parse-route
      # 用户确认策略后，异步执行“切块 + 向量化 + 入库”的主题。
      index-topic: super-agent-document-index-build
      # Kafka 消费组名称。
      group-id: super-agent-document-manage
      # 本地开发时是否自动创建主题。
      # 如果线上 Kafka 不允许自动建 topic，可以改成 false，然后手动创建。
      auto-create-topics: true
    chunk:
      # 递归分块时，单块允许的最大字符数。
      # 当结构块或语义块过大时，会继续往下递归裁切。
      recursive-max-chars: 800
      # 递归分块时，相邻 chunk 之间保留的重叠字符数。
      # 这样可以缓解自然边界切分后，关键信息正好落在块边界附近导致的上下文断裂。
      recursive-overlap-chars: 120
      # 语义分块时，目标块的最大字符数。
      semantic-max-chars: 700
      # 语义分块时，目标块的最小字符数。
      # 避免切得过碎，影响召回效果。
      semantic-min-chars: 240
      # 语义相似度阈值。
      # 用于判断相邻文本是否应该继续合并为同一个 chunk。
      semantic-similarity-threshold: 0.18
      # 是否开启基于大模型的智能切块。
      # 第一阶段默认关闭，避免成本和复杂度过高。
      llm-enabled: false
      # 大模型智能切块时，单次送给模型的最大字符数。
      llm-max-chars: 3500
      # 当文档内容质量较差时，是否推荐追加大模型智能切块。
      recommend-llm-when-low-quality: true
    pgvector:
      # 是否启用 PGVector 向量写入。
      # 关闭后，向量化链路不会创建 PG 专用数据源。
      enabled: true
      # PostgreSQL 主机地址。
      host: 10.21.32.85
      # PostgreSQL 端口。
      port: 5432
      # PGVector 使用的数据库名。
      database: super_agent_pgvector
      # 默认 schema。
      schema: public
      # PostgreSQL 用户名。
      username: postgres
      # PostgreSQL 密码。
      password: admin123
      # 连接池名称，方便日志和监控定位。
      pool-name: super-agent-manage-pgvector-hikari
      # 连接池最大连接数。
      maximum-pool-size: 5
      # 连接池最小空闲连接数。
      minimum-idle: 1
    elasticsearch:
      # 是否启用 Elasticsearch 关键词检索。
      enabled: true
      # Elasticsearch 地址列表。
      uris:
        - http://10.21.32.85:9200
      # Elasticsearch 用户名。
      username: elastic
      # Elasticsearch 密码。
      password: admin123
      # 关键词索引名称。
      index-name: ${prefix.distinction.name:super-agent}-document-keyword
      # 导航层结构节点索引名称，粒度是 section/step/list_item，不和 chunk 级关键词索引混用。
      navigation-index-name: ${prefix.distinction.name:super-agent}-document-navigation
      # 知识路由索引名称，粒度是 scope/topic/document 路由元数据，不和正文索引混用。
      route-index-name: ${prefix.distinction.name:super-agent}-knowledge-route
      # 建索引 analyzer。
      # 如果本地未安装 IK 插件，启动时会自动回退到 standard。
      analyzer: ik_max_word
      # 搜索 analyzer。
      search-analyzer: ik_smart
      # 连接超时，毫秒。
      connect-timeout-millis: 3000
      # 读超时，毫秒。
      socket-timeout-millis: 5000
    neo4j:
      # 是否启用 Neo4j 结构图。默认关闭，关闭时结构图服务自动回退到 MySQL 结构节点表。
      enabled: true
      uri: bolt://10.21.32.85:7687
      username: neo4j
      password: admin123
      database: neo4j
      query-timeout-seconds: 5

logging:
  level:
    org.springframework.ai: DEBUG
    com.alibaba.cloud.ai: DEBUG
    org.javaup.ai.chatagent: INFO
    org.javaup.ai.manage: INFO

management:
  metrics:
    tags:
      application: super-agent-business-chat
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'
  health:
    elasticsearch:
      enabled: false
  prometheus:
    metrics:
      export:
        enabled: true
